<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .current {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 130px;
    border-right: 1px solid #222222;
    padding-right: 24px;
  }

  .location {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #e8e8e8;
    text-transform: uppercase;
  }

  .location span {
    display: block;
    font-size: 9px;
    color: #606060;
    letter-spacing: 0.1em;
  }

  .current-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .current-icon { font-size: 22px; }

  .current-temp {
    font-size: 26px;
    color: #e8e8e8;
    letter-spacing: -0.02em;
  }

  .current-condition {
    font-size: 10px;
    color: #606060;
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }

  .forecast {
    display: flex;
    gap: 0;
    flex: 1;
    overflow-x: auto;
  }

  .day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex: 1;
    padding: 0 8px;
    border-right: 1px solid #1a1a1a;
  }

  .day:last-child { border-right: none; }

  .day-name {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #e8e8e8;
    text-transform: capitalize;
  }

  .day-icon { font-size: 18px; }

  .day-hi {
    font-size: 12px;
    color: #e8e8e8;
  }

  .day-lo {
    font-size: 11px;
    color: #606060;
  }

  .error {
    color: #606060;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  .forecast::-webkit-scrollbar { height: 2px; }
  .forecast::-webkit-scrollbar-track { background: transparent; }
  .forecast::-webkit-scrollbar-thumb { background: #222222; }
</style>
</head>
<body>
<div class="container">
  <div class="current">
    <div class="location">Rock Island<span>weather</span></div>
    <div class="current-row">
      <span class="current-icon" id="cur-icon">⏳</span>
      <span class="current-temp" id="cur-temp">--°F</span>
    </div>
    <div class="current-condition" id="cur-cond">loading...</div>
  </div>
  <div class="forecast" id="forecast">
    <div class="error">fetching forecast...</div>
  </div>
</div>

<script>
  const API_KEY = '92c6f4e36a9fb5f60329fd71f6187d30'; 
  const LAT = 41.4931;
  const LON = -90.5748;
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const iconMap = code => {
    if (code <= 232) return '⛈️';
    if (code <= 321) return '🌦️';
    if (code <= 531) return '🌧️';
    if (code <= 622) return '❄️';
    if (code <= 781) return '🌪️';
    if (code === 800) return '☀️';
    if (code === 801) return '🌤️';
    if (code <= 803) return '⛅';
    return '☁️';
  };

  async function load() {
    try {
      const cur = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=imperial`
      ).then(r => r.json());

      document.getElementById('cur-icon').textContent = iconMap(cur.weather[0].id);
      document.getElementById('cur-temp').textContent = `${Math.round(cur.main.temp)}°F`;
      document.getElementById('cur-cond').textContent = cur.weather[0].description;

      const fore = await fetch(
        `https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=imperial`
      ).then(r => r.json());

      const byDay = {};
      fore.list.forEach(item => {
        const d = new Date(item.dt * 1000);
        const key = d.toDateString();
        if (!byDay[key]) byDay[key] = { hi: -999, lo: 999, icon: item.weather[0].id, date: d };
        byDay[key].hi = Math.max(byDay[key].hi, item.main.temp_max);
        byDay[key].lo = Math.min(byDay[key].lo, item.main.temp_min);
      });

      const days = Object.values(byDay).slice(0, 8);
      const fc = document.getElementById('forecast');
      fc.innerHTML = days.map(d => `
        <div class="day">
          <div class="day-name">${DAYS[d.date.getDay()]}</div>
          <div class="day-icon">${iconMap(d.icon)}</div>
          <div class="day-hi">${Math.round(d.hi)}°</div>
          <div class="day-lo">${Math.round(d.lo)}°</div>
        </div>
      `).join('');

    } catch(e) {
      document.getElementById('forecast').innerHTML =
        '<div class="error">could not load weather</div>';
    }
  }

  load();
  setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
